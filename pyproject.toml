[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "satisfaction-suffices"
version = "0.0.2"
description = "SAT-gated structural containment for AI — verification gate, four-verdict system, proof evolution, and paradox logic"
readme = "README.md"
<<<<<<< Updated upstream
license = "LicenseRef-The-Time-License"
=======
license = {text = "The Time License"}
>>>>>>> Stashed changes
requires-python = ">=3.10"
authors = [
    {name = "TimeLordRaps"},
]
keywords = ["sat", "verification", "ai-safety", "structural-containment", "proof-evolution", "paradox-logic"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = []

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[project.urls]
Homepage = "https://github.com/TimeLordRaps/satisfaction-suffices"
Repository = "https://github.com/TimeLordRaps/satisfaction-suffices"
Issues = "https://github.com/TimeLordRaps/satisfaction-suffices/issues"
Changelog = "https://github.com/TimeLordRaps/satisfaction-suffices/releases"
Paper = "https://github.com/TimeLordRaps/satisfaction-suffices/blob/main/paper/paper_01_submission.md"
License = "https://github.com/TimeLordRaps/satisfaction-suffices/blob/main/LICENSE"
"License Registry" = "https://github.com/TimeLordRaps/satisfaction-suffices/blob/main/SCHEDULE_A.md"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["satisfaction_suffices*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = [
    "-q",
    "--cov=satisfaction_suffices.verifier.verify",
    "--cov=satisfaction_suffices.verifier.partial",
    "--cov=satisfaction_suffices.verifier.sat",
    "--cov=satisfaction_suffices.logic.ppl",
    "--cov=satisfaction_suffices.logic.constraint",
    "--cov=satisfaction_suffices.logic.proof_evo",
    "--cov=satisfaction_suffices.bridge",
    "--cov-report=term-missing",
    "--cov-fail-under=50",
]

[tool.coverage.run]
branch = true
parallel = false

[tool.coverage.report]
show_missing = true
skip_covered = false
