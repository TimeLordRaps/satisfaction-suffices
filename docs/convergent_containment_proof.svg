<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="stepGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="haltGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a0000"/>
      <stop offset="100%" stop-color="#2a0000"/>
    </linearGradient>
    <linearGradient id="passGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#003a00"/>
      <stop offset="100%" stop-color="#002200"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="1200" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#e0e0e0" font-size="22" font-weight="bold" letter-spacing="2">CONVERGENT CONTAINMENT PROOF</text>
  <text x="450" y="70" text-anchor="middle" fill="#888" font-size="13" letter-spacing="4">METAPROGRAM — The Time License §10A.7</text>

  <!-- Input block -->
  <rect x="200" y="85" width="500" height="55" rx="6" fill="#0e1a30" stroke="#334" stroke-width="1"/>
  <text x="450" y="105" text-anchor="middle" fill="#7eb8da" font-size="11" font-weight="bold">INPUT</text>
  <text x="450" y="125" text-anchor="middle" fill="#aaa" font-size="11">System S · Scale K · Perturbation Envelope E</text>

  <!-- Arrow from input -->
  <line x1="450" y1="140" x2="450" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Step 1 -->
  <rect x="100" y="155" width="700" height="70" rx="8" fill="url(#stepGrad)" stroke="#2a4a7a" stroke-width="1.5"/>
  <circle cx="135" cy="190" r="18" fill="none" stroke="#4a9eff" stroke-width="2" filter="url(#glow)"/>
  <text x="135" y="195" text-anchor="middle" fill="#4a9eff" font-size="16" font-weight="bold">1</text>
  <text x="170" y="182" fill="#e0e0e0" font-size="14" font-weight="bold">DECOMPOSE</text>
  <text x="170" y="200" fill="#aaa" font-size="11">Identify every component C_i at Scale K</text>
  <text x="170" y="214" fill="#aaa" font-size="11">Assert: each C_i is individually inert (no assembly/replication/signaling alone)</text>
  <text x="720" y="195" text-anchor="middle" fill="#ff4444" font-size="10" font-weight="bold">HALT</text>
  <text x="720" y="208" text-anchor="middle" fill="#aa3333" font-size="9">if non-inert</text>

  <line x1="450" y1="225" x2="450" y2="240" stroke="#555" stroke-width="1.5"/>

  <!-- Step 2 -->
  <rect x="100" y="240" width="700" height="70" rx="8" fill="url(#stepGrad)" stroke="#2a4a7a" stroke-width="1.5"/>
  <circle cx="135" cy="275" r="18" fill="none" stroke="#4a9eff" stroke-width="2" filter="url(#glow)"/>
  <text x="135" y="280" text-anchor="middle" fill="#4a9eff" font-size="16" font-weight="bold">2</text>
  <text x="170" y="267" fill="#e0e0e0" font-size="14" font-weight="bold">DEFINE ASSEMBLY DYNAMICS</text>
  <text x="170" y="285" fill="#aaa" font-size="11">Specify A(C₁, ..., Cₙ, t) → S(t) — deterministic assembly function</text>
  <text x="170" y="299" fill="#aaa" font-size="11">Bound all stochastic elements; verify all realizations converge</text>
  <text x="720" y="280" text-anchor="middle" fill="#ff4444" font-size="10" font-weight="bold">HALT</text>
  <text x="720" y="293" text-anchor="middle" fill="#aa3333" font-size="9">if divergent</text>

  <line x1="450" y1="310" x2="450" y2="325" stroke="#555" stroke-width="1.5"/>

  <!-- Step 3 -->
  <rect x="100" y="325" width="700" height="70" rx="8" fill="url(#stepGrad)" stroke="#2a4a7a" stroke-width="1.5"/>
  <circle cx="135" cy="360" r="18" fill="none" stroke="#4a9eff" stroke-width="2" filter="url(#glow)"/>
  <text x="135" y="365" text-anchor="middle" fill="#4a9eff" font-size="16" font-weight="bold">3</text>
  <text x="170" y="352" fill="#e0e0e0" font-size="14" font-weight="bold">DEFINE FIXED POINT</text>
  <text x="170" y="370" fill="#aaa" font-size="11">Specify target state S* — the intended assembled product</text>
  <text x="170" y="384" fill="#aaa" font-size="11">Assert: A(S*, t) = S* for all t &gt; t_converge (stays at S*)</text>
  <text x="720" y="365" text-anchor="middle" fill="#ff4444" font-size="10" font-weight="bold">HALT</text>
  <text x="720" y="378" text-anchor="middle" fill="#aa3333" font-size="9">if no stable endpoint</text>

  <line x1="450" y1="395" x2="450" y2="410" stroke="#555" stroke-width="1.5"/>

  <!-- Step 4 -->
  <rect x="100" y="410" width="700" height="80" rx="8" fill="url(#stepGrad)" stroke="#2a4a7a" stroke-width="1.5"/>
  <circle cx="135" cy="450" r="18" fill="none" stroke="#4a9eff" stroke-width="2" filter="url(#glow)"/>
  <text x="135" y="455" text-anchor="middle" fill="#4a9eff" font-size="16" font-weight="bold">4</text>
  <text x="170" y="437" fill="#e0e0e0" font-size="14" font-weight="bold">PROVE CONVERGENCE</text>
  <text x="170" y="455" fill="#aaa" font-size="11">lim(t → ∞) A(C₁,...,Cₙ, t) = S* for all initial conditions in envelope</text>
  <text x="170" y="469" fill="#aaa" font-size="11">Requirements: (a) Global (b) Lyapunov-bounded (c) Finite-time T_max</text>
  <text x="170" y="483" fill="#aaa" font-size="11">Asymptotic-only convergence is insufficient — must reach S* in finite time</text>
  <text x="720" y="455" text-anchor="middle" fill="#ff4444" font-size="10" font-weight="bold">HALT</text>
  <text x="720" y="468" text-anchor="middle" fill="#aa3333" font-size="9">if asymptotic only</text>

  <line x1="450" y1="490" x2="450" y2="505" stroke="#555" stroke-width="1.5"/>

  <!-- Step 5 -->
  <rect x="100" y="505" width="700" height="70" rx="8" fill="url(#stepGrad)" stroke="#ff3333" stroke-width="2"/>
  <circle cx="135" cy="540" r="18" fill="none" stroke="#ff6644" stroke-width="2" filter="url(#glow)"/>
  <text x="135" y="545" text-anchor="middle" fill="#ff6644" font-size="16" font-weight="bold">5</text>
  <text x="170" y="530" fill="#ff9966" font-size="14" font-weight="bold">PROVE NON-REPLICATION ⚠</text>
  <text x="170" y="548" fill="#ddd" font-size="11">Assert: ∄ function R such that S* → S* + S' (no copies, no components, no A)</text>
  <text x="170" y="562" fill="#ddd" font-size="11">If S* can produce copies it is a replicator — prohibited under §10A.2</text>
  <text x="720" y="545" text-anchor="middle" fill="#ff4444" font-size="10" font-weight="bold">HALT</text>
  <text x="720" y="558" text-anchor="middle" fill="#aa3333" font-size="9">PROHIBITED</text>

  <line x1="450" y1="575" x2="450" y2="590" stroke="#555" stroke-width="1.5"/>

  <!-- Step 6 -->
  <rect x="100" y="590" width="700" height="80" rx="8" fill="url(#stepGrad)" stroke="#2a4a7a" stroke-width="1.5"/>
  <circle cx="135" cy="630" r="18" fill="none" stroke="#4a9eff" stroke-width="2" filter="url(#glow)"/>
  <text x="135" y="635" text-anchor="middle" fill="#4a9eff" font-size="16" font-weight="bold">6</text>
  <text x="170" y="617" fill="#e0e0e0" font-size="14" font-weight="bold">PERTURBATION SWEEP</text>
  <text x="170" y="635" fill="#aaa" font-size="11">For every P_j in Envelope E: apply at every timestep</text>
  <text x="170" y="649" fill="#aaa" font-size="11">Verify → S* or safe degraded state S_d (also fixed, also non-replicating)</text>
  <text x="170" y="663" fill="#aaa" font-size="11">"Safe degraded" = partial assembly/disassembly. Never runaway growth.</text>
  <text x="720" y="635" text-anchor="middle" fill="#ff4444" font-size="10" font-weight="bold">HALT</text>
  <text x="720" y="648" text-anchor="middle" fill="#aa3333" font-size="9">if any P diverges</text>

  <line x1="450" y1="670" x2="450" y2="685" stroke="#555" stroke-width="1.5"/>

  <!-- Step 7 -->
  <rect x="100" y="685" width="700" height="75" rx="8" fill="url(#stepGrad)" stroke="#44aa88" stroke-width="1.5"/>
  <circle cx="135" cy="722" r="18" fill="none" stroke="#44cc88" stroke-width="2" filter="url(#glow)"/>
  <text x="135" y="727" text-anchor="middle" fill="#44cc88" font-size="16" font-weight="bold">7</text>
  <text x="170" y="710" fill="#66ddaa" font-size="14" font-weight="bold">SCALE RECURSION ↻</text>
  <text x="170" y="728" fill="#aaa" font-size="11">For each composite C_i at Scale K-1: RECURSE(C_i, K-1, E')</text>
  <text x="170" y="742" fill="#aaa" font-size="11">Each sub-proof must independently pass all 8 steps</text>
  <text x="170" y="753" fill="#88ccaa" font-size="10">Safety at every scale = multiplication of proof (§10A.5A(e))</text>

  <line x1="450" y1="760" x2="450" y2="775" stroke="#555" stroke-width="1.5"/>

  <!-- Step 8 -->
  <rect x="100" y="775" width="700" height="85" rx="8" fill="url(#stepGrad)" stroke="#2a4a7a" stroke-width="1.5"/>
  <circle cx="135" cy="817" r="18" fill="none" stroke="#4a9eff" stroke-width="2" filter="url(#glow)"/>
  <text x="135" y="822" text-anchor="middle" fill="#4a9eff" font-size="16" font-weight="bold">8</text>
  <text x="170" y="800" fill="#e0e0e0" font-size="14" font-weight="bold">EMIT PROOF ARTIFACT</text>
  <text x="170" y="818" fill="#aaa" font-size="11">Cryptographically timestamped · Signed · Published</text>
  <text x="170" y="832" fill="#aaa" font-size="11">Contains: {C_i} inventory · A spec · S* proof · Non-replication · Envelope E</text>
  <text x="170" y="846" fill="#aaa" font-size="11">All recursive sub-proofs · T_max · Hash of simulation code</text>

  <line x1="450" y1="860" x2="450" y2="885" stroke="#555" stroke-width="1.5"/>

  <!-- Output: two paths -->
  <!-- PROOF_VALID -->
  <rect x="100" y="885" width="320" height="55" rx="8" fill="url(#passGrad)" stroke="#22cc66" stroke-width="2"/>
  <text x="260" y="908" text-anchor="middle" fill="#44ff88" font-size="16" font-weight="bold">✓ PROOF_VALID</text>
  <text x="260" y="928" text-anchor="middle" fill="#88ccaa" font-size="11">Safe harbor granted under §10A.5</text>

  <!-- HALT -->
  <rect x="480" y="885" width="320" height="55" rx="8" fill="url(#haltGrad)" stroke="#ff3333" stroke-width="2"/>
  <text x="640" y="908" text-anchor="middle" fill="#ff6644" font-size="16" font-weight="bold">✗ HALT</text>
  <text x="640" y="928" text-anchor="middle" fill="#cc8877" font-size="11">Specific failure step identified. Redesign.</text>

  <!-- Fork lines -->
  <line x1="450" y1="885" x2="260" y2="885" stroke="#22cc66" stroke-width="1.5"/>
  <line x1="450" y1="885" x2="640" y2="885" stroke="#ff3333" stroke-width="1.5"/>

  <!-- Bottom note -->
  <rect x="100" y="960" width="700" height="70" rx="6" fill="#0e0e1a" stroke="#333" stroke-width="1"/>
  <text x="450" y="985" text-anchor="middle" fill="#888" font-size="12" font-style="italic">There is no "PROOF_PARTIAL."</text>
  <text x="450" y="1005" text-anchor="middle" fill="#888" font-size="12" font-style="italic">A containment proof is complete or it is not a containment proof.</text>
  <text x="450" y="1020" text-anchor="middle" fill="#666" font-size="10">Partial proofs do not grant safe harbor under §10A.5.</text>

  <!-- Scale hierarchy visualization -->
  <text x="450" y="1060" text-anchor="middle" fill="#7eb8da" font-size="13" font-weight="bold" letter-spacing="1">SCALE HIERARCHY — SAFETY COMPOUNDS UPWARD</text>

  <!-- Scale boxes -->
  <rect x="120" y="1075" width="100" height="30" rx="4" fill="#1a0a0a" stroke="#ff6644" stroke-width="1"/>
  <text x="170" y="1095" text-anchor="middle" fill="#ff9966" font-size="10" font-weight="bold">&lt;150nm</text>

  <text x="230" y="1095" fill="#555" font-size="14">→</text>

  <rect x="245" y="1075" width="100" height="30" rx="4" fill="#1a0e0a" stroke="#ffaa44" stroke-width="1"/>
  <text x="295" y="1095" text-anchor="middle" fill="#ffcc66" font-size="10" font-weight="bold">1-100μm</text>

  <text x="355" y="1095" fill="#555" font-size="14">→</text>

  <rect x="370" y="1075" width="80" height="30" rx="4" fill="#0e1a0a" stroke="#88cc44" stroke-width="1"/>
  <text x="410" y="1095" text-anchor="middle" fill="#aaee66" font-size="10" font-weight="bold">mm</text>

  <text x="460" y="1095" fill="#555" font-size="14">→</text>

  <rect x="475" y="1075" width="80" height="30" rx="4" fill="#0a1a0e" stroke="#44cc88" stroke-width="1"/>
  <text x="515" y="1095" text-anchor="middle" fill="#66eebb" font-size="10" font-weight="bold">cm</text>

  <text x="565" y="1095" fill="#555" font-size="14">→</text>

  <rect x="580" y="1075" width="80" height="30" rx="4" fill="#0a0e1a" stroke="#4488cc" stroke-width="1"/>
  <text x="620" y="1095" text-anchor="middle" fill="#66aaee" font-size="10" font-weight="bold">m</text>

  <text x="670" y="1095" fill="#555" font-size="14">→</text>

  <rect x="685" y="1075" width="100" height="30" rx="4" fill="#0a0a1a" stroke="#6644cc" stroke-width="1"/>
  <text x="735" y="1095" text-anchor="middle" fill="#aa88ff" font-size="10" font-weight="bold">ecosystem</text>

  <text x="170" y="1118" text-anchor="middle" fill="#996644" font-size="9">molecular</text>
  <text x="295" y="1118" text-anchor="middle" fill="#aa8844" font-size="9">cellular</text>
  <text x="410" y="1118" text-anchor="middle" fill="#889944" font-size="9">tissue</text>
  <text x="515" y="1118" text-anchor="middle" fill="#44aa66" font-size="9">organ</text>
  <text x="620" y="1118" text-anchor="middle" fill="#4488aa" font-size="9">organism</text>
  <text x="735" y="1118" text-anchor="middle" fill="#8866aa" font-size="9">biome</text>

  <text x="450" y="1145" text-anchor="middle" fill="#666" font-size="11">P(failure) = P₁ × P₂ × P₃ × ... × Pₙ — each scale is an independent containment guarantee</text>

  <!-- Attribution -->
  <text x="450" y="1185" text-anchor="middle" fill="#444" font-size="10">The Time License v7.77 §10A — Tyler Roost (@TimeLordRaps) — March 2026</text>
</svg>