name: Sync LICENSE

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

jobs:
  sync-license:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch canonical LICENSE from GitHub Pages
        run: curl -fsSL https://timelordraps.github.io/the-time-license/LICENSE -o LICENSE
      - name: Commit synced LICENSE
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LICENSE .github/workflows/sync-license.yml
          git diff --cached --quiet || git commit -m "chore: sync LICENSE from canonical"
          git push
