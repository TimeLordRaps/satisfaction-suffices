repos:
  - repo: local
    hooks:
      - id: sat-gate
        name: SAT Verification Gate
        language: system
        entry: uv run python scripts/sat_gate.py
        pass_filenames: false
        always_run: true
        stages: [commit]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.3
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
